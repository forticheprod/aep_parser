name: Quality
on:
  push:
    branches: [main]
  pull_request:
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ruff
        uses: astral-sh/ruff-action@v3
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Type check with mypy
        run: uv run mypy src/aep_parser
  pytest-37:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
      with:
        lfs: true
    - name: Set up Python 3.7
      uses: actions/setup-python@v6
      with:
        python-version: '3.7'
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Install dependencies
      run: uv sync --extra dev
    - name: Test with pytest
      run: uv run pytest -v --no-header --override-ini="addopts=-ra" --tb=short
  pytest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        lfs: true
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Install dependencies
      run: uv sync --extra dev
    - name: Test with pytest
      run: uv run pytest -v --no-header --override-ini="addopts=-ra -n auto" --tb=short